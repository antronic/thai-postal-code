name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Test & Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        bun-version: ["1.1", "latest"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun ${{ matrix.bun-version }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies
        run: bun install

      - name: Fetch & bundle data
        run: bun run data:pipeline

      - name: Format code
        run: bun run format

      - name: Type check
        run: bun run build:check

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Test
        run: bun test --coverage

      - name: Build
        run: bun run build